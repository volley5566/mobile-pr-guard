plugins { id 'com.android.application' }

android {
    namespace 'com.demo'
    compileSdk 35
    defaultConfig {
        applicationId "com.demo"
        minSdk 23
        targetSdk 35
        versionCode 12          // 改了 versionCode -> 触发发版风险规则
        versionName "1.3.0"
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.13.1'
    implementation 'com.google.firebase:firebase-analytics:+'   // 动态版本 + 统计SDK -> 触发规则2
    implementation 'com.applovin:applovin-sdk:12.0.0'           // 广告SDK -> 触发规则2
}
